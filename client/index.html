<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Primary meta ── -->
    <title>CERTIFIVE - Certificados de Eficiencia Energética</title>
    <meta name="description" content="Plataforma de gestión de certificaciones energéticas para auditores profesionales en España" />
    <meta name="keywords" content="certificado energético, CEE, certificación energética, España, auditor energético" />
    <meta name="author" content="Certifive" />

    <!-- ── Theme color (emerald-600) ── -->
    <meta name="theme-color" content="#059669" />
    <meta name="msapplication-navbutton-color" content="#059669" />
    <meta name="msapplication-TileColor" content="#059669" />

    <!-- ── PWA manifest ── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/svg+xml" sizes="192x192" href="/icons/icon-192.svg" />

    <!-- ── Apple / iOS PWA ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Certifive" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <!-- Splash screens for common iOS devices -->
    <meta name="apple-touch-fullscreen" content="yes" />

    <!-- ── Open Graph (for sharing) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CERTIFIVE - Certificados de Eficiencia Energética" />
    <meta property="og:description" content="Plataforma de gestión de certificaciones energéticas para auditores profesionales en España" />
    <meta property="og:image" content="/icons/icon-512.svg" />

    <!-- ── Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />

    <!-- ── Mobile web-app optimization ── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="HandheldFriendly" content="True" />
    <meta name="MobileOptimized" content="320" />

    <!-- ── iOS tap highlight ── -->
    <style>
      * { -webkit-tap-highlight-color: transparent; }
      /* Safe-area insets utility */
      .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
      .safe-top    { padding-top:    env(safe-area-inset-top);    }
      /* Prevent font zoom on iOS inputs – global rule */
      input, select, textarea { font-size: 16px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
