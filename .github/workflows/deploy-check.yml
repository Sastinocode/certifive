name: Deploy Check

on:
  pull_request:
    branches: [main]

jobs:
  deploy-check:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        id: build
        run: npm run build

      - name: TypeScript check
        id: tsc
        run: npx tsc --noEmit

      - name: Tests
        id: tests
        run: npm run test --if-present

      - name: Comment PR result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const icon = (r) => r === 'success' ? '✅' : r === 'failure' ? '❌' : '⏭️';

            const build  = '${{ steps.build.outcome }}';
            const tsc    = '${{ steps.tsc.outcome }}';
            const tests  = '${{ steps.tests.outcome }}';

            const allGood = build === 'success' && tsc === 'success';
            const summary = allGood
              ? '**✅ Listo para hacer merge**'
              : '**❌ Corrige los errores antes de hacer merge**';

            const body = [
              '## 🔍 Deploy Check',
              '',
              '| Paso | Resultado |',
              '|------|-----------|',
              `| Build (\`npm run build\`) | ${icon(build)} ${build} |`,
              `| TypeScript (\`tsc --noEmit\`) | ${icon(tsc)} ${tsc} |`,
              `| Tests | ${icon(tests)} ${tests} |`,
              '',
              summary,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
